<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./images/favicon.svg" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <!-- links to google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Outfit:wght@100..900&family=Pacifico&family=Petit+Formal+Script&family=Playwrite+US+Trad:wght@100..400&family=Roboto:ital,wght@0,100..900;1,100..900&family=Squada+One&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">

    <!-- links to bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script defer src="Navbar.js"></script>


    <title>Andrew's CV</title>
</head>

<body>
    <div class="w-100 h-100 position-fixed z-0" style="backdrop-filter: blur(5px);"></div>
    <nav-bar></nav-bar>
    <div style="min-height: 50px; top: 0;"></div>

    <main
        class="col-12 container z-1 m-0 mx-auto d-flex align-items-center d-flex flex-column justify-content-center text-center "
        style="width: 100%;">
        <h1 class="px-1 my-4"><span class="rounded-5 px-4 pb-1" style="background-color: var(--green1);"><span
                    class="material-symbols-outlined" style=" width: 50px; scale: 2;">
                    photo
                </span>Gallery</span></h1>
        <div class="col-12 container d-flex justify-content-center align-items-center flex-column gap-4 mb-3"
            style="width: 90%;">
            <div id="carouselExampleCaptions" class="carousel slide w-75">
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="0" class="active"
                        aria-current="true" aria-label="Slide 1"></button>
                    <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="1"
                        aria-label="Slide 2"></button>
                    <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="2"
                        aria-label="Slide 3"></button>
                </div>
                <div class="col-12 carousel-inner rounded">
                    <div class="carousel-item active">
                        <img src="./images/Airsoft Tools.png" class="d-block w-100" alt="Airsoft Tools"
                            style="object-fit: cover; height: 400px;">
                        <div class="carousel-caption d-md-block">
                            <h5><span class="rounded px-1" style="background-color: var(--green1);">Airsoft
                                    Tools</span></h5>
                            <p><span class="rounded px-1" style="background-color: var(--green1);">This is the front
                                    page
                                    of my Airsoft Tools project</span></p>
                        </div>
                    </div>
                    <div class="carousel-item">
                        <img src="./images/Airsoft Team.jpg" class="d-block w-100" alt="Airsoft Team"
                            style="object-fit: cover; height: 400px;">
                        <div class="carousel-caption">
                            <h5><span class="rounded px-1" style="background-color: var(--green1);">My Airsoft
                                    Team</span></h5>
                        </div>
                    </div>
                    <div class="carousel-item">
                        <img src="./images/Study App.png" class="d-block w-100" alt="Study App"
                            style="object-fit: cover; height: 400px;">
                        <div class="carousel-caption d-none d-md-block">
                            <h5><span class="rounded px-1" style="background-color: var(--green1);">Study App</span>
                            </h5>
                            <p><span class="rounded px-1" style="background-color: var(--green1);">Prototype of my first
                                    web app</span></p>
                        </div>
                    </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions"
                    data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions"
                    data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </div>
        </div>

    </main>

</body>

</html>
