<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./images/favicon.svg" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <!-- links to google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Outfit:wght@100..900&family=Pacifico&family=Petit+Formal+Script&family=Playwrite+US+Trad:wght@100..400&family=Roboto:ital,wght@0,100..900;1,100..900&family=Squada+One&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">

    <!-- links to bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script defer src="Navbar.js"></script>

    <title>Andrew's CV</title>
</head>

<body id="top">
    <div class="w-100 h-100 position-fixed z-0" style="backdrop-filter: blur(5px);"></div>
    <nav-bar></nav-bar>
    <div style="min-height: 50px; top: 0;"></div>
    <main class="text-center z-1 d-flex justify-content-center align-items-center flex-column p-4">
        <article class="d-flex flex-wrap gap-3 flex-column justify-content-center container" style="width: 700px;">
            <!-- Title Card -->
            <section class="card p-3 container"
                style="background-color: rgba(0, 0, 0, 0.1); backdrop-filter: blur(10px);">
                <div class="row">

                    <div class="col order-sm-1">
                        <h3 class="card-title m-0 px-3 py-1 rounded-5"
                            style="box-shadow: 2px 4px 8px 2px rgba(0, 0, 0, 0.5); background-color: var(--green1);">
                            Andrew Kostiv</h3>
                        <p class="card-body">
                            <span class="bg-white px-1 rounded">Frontend Software Developer</span><br>
                            <span class="bg-white px-1 rounded">Binghamton NY</span>
                        </p>
                    </div>
                    <div class="col-sm-4 order-sm-0">
                        <img src="./images/pfp.jpg" id="pfp" alt="Andrew Kostiv" class="card-img rounded-3"
                            style="width: 150px;">
                    </div>
                </div>
            </section>
            <!-- Skills Card -->
            <section class="card p-3" style="background-color: rgba(0, 0, 0, 0.1); backdrop-filter: blur(10px);">
                <h3 class="card-title">
                    <span class="bg-white px-3 pb-1 rounded-5">
                        <span class="material-symbols-outlined">stacks</span>
                        My Tech Stack</span>
                </h3>
                <div class="card-body d-flex gap-2 flex-wrap justify-content-center">
                    <div class="skill-card rounded-3 p-2">
                        <h3 class="fs-6">React</h3>
                        <img style="width: 50px" src="./images/React.svg" alt="">
                    </div>
                    <div class="skill-card rounded-3 p-2">
                        <h3 class="fs-6">JavaScript</h3>
                        <img style="width: 50px" src="./images/JavaScript.svg" alt="">
                    </div>
                    <div class="skill-card rounded-3 p-2">
                        <h3 class="fs-6">HTML</h3>
                        <img style="width: 50px" src="./images/HTML.svg" alt="">
                    </div>
                    <div class="skill-card rounded-3 p-2">
                        <h3 class="fs-6">CSS</h3>
                        <img style="width: 50px" src="./images/CSS.svg" alt="">
                    </div>
                </div>
            </section>
            <!-- Bio -->
            <section class="card p-3" style="background-color: rgba(0, 0, 0, 0.1); backdrop-filter: blur(10px);">
                <h3 class="card-title">
                    <span class="card-title m-0 bg-white px-3 pb-1 rounded-5">
                        <span class="material-symbols-outlined">menu_book</span>
                        About Me</span>
                </h3>
                <div class="card-body">
                    <span class="bg-white px-2 rounded">Im a CS student at Binghamton University.</span><br>
                    <span class="bg-white px-2 rounded">Coding has been a hobby of mine, for the past three
                        years.</span><br>
                    <span class="bg-white px-2 rounded">Currently I am studying to become a software engineer</span>
                </div>
            </section>

            <a class="col-12 text-decoration-none" href="#top"><span class="bg-white px-3 pb-1 rounded-5 ">Return to
                    top</span></a>
        </article>

    </main>
</body>

</html>
