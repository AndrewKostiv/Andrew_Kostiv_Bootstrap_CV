<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./images/favicon.svg" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <!-- links to google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Outfit:wght@100..900&family=Pacifico&family=Petit+Formal+Script&family=Playwrite+US+Trad:wght@100..400&family=Roboto:ital,wght@0,100..900;1,100..900&family=Squada+One&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">

    <!-- links to bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script defer src="Navbar.js"></script>


    <title>Andrew's CV</title>
</head>

<body>
    <div class="w-100 h-100 position-fixed z-0" style="backdrop-filter: blur(5px);"></div>
    <nav-bar></nav-bar>
    <div style="min-height: 50px; top: 0;"></div>

    <main class="container z-1 text-center pt-5 h-100 d-flex flex-column" style="width: 700px;">

        <section class="card p-3 mb-3 custom-bg" style="backdrop-filter: blur(10px);">
            <h1 class="card-title"><span class="card-title m-0 px-3 pb-1 rounded-5"
                    style="background-color: var(--green1);"><span class="material-symbols-outlined"
                        style="width: 50px; scale: 1.5;">
                        call
                    </span>Contact Info</span></h1>
            <div class="card-body">
                <span class="bg-white px-2 rounded"> Email: Akostiv@binghamton.edu</span><br>
                <span class="bg-white px-2 rounded"> Email2: AndrewKostiv1@gmail.com</span>
            </div>
            <form class="row g-3 needs-validation" novalidate>
                <div class="col-md-4">
                    <label for="validationCustom01" class="form-label">First name</label>
                    <input type="text" class="form-control" id="validationCustom01" required>
                    <div class="valid-feedback">
                        Looks good!
                    </div>
                </div>
                <div class="col-md-4">
                    <label for="validationCustom02" class="form-label">Last name</label>
                    <input type="text" class="form-control" id="validationCustom02" required>
                    <div class="valid-feedback">
                        Looks good!
                    </div>
                </div>
                <div class="col-md-4">
                    <label for="validationCustomEmail" class="form-label">Email</label>
                    <div class="input-group has-validation">
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="validationCustomEmail"
                                placeholder="name@example.com" required>
                            <label for="floatingInput">Email address</label>
                        </div>
                        <div class="invalid-feedback">
                            Please choose an Email.
                        </div>
                    </div>
                </div>
                <label for="floatingTextarea2" class="form-label">Comments</label>
                <div class="form-floating">
                    <textarea class="form-control" placeholder="Leave a comment here" id="floatingTextarea2"
                        style="height: 100px"></textarea>
                    <label for="floatingTextarea2">Comments</label>
                </div>
                <div class="col-12">
                    <button id="contact-submit-btn" class="btn" style="background-color: var(--green1); "
                        type="submit">Submit form</button>
                </div>
            </form>
        </section>
        <div class="d-flex flex-grow-1"></div>
        <a class="col-12 text-decoration-none p-4" href="#top"><span class="bg-white px-3 pb-1 rounded-5 ">Return to
                top</span></a>

    </main>
</body>

</html>
