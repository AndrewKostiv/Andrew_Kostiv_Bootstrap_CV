<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./images/favicon.svg" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <!-- links to google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Outfit:wght@100..900&family=Pacifico&family=Petit+Formal+Script&family=Playwrite+US+Trad:wght@100..400&family=Roboto:ital,wght@0,100..900;1,100..900&family=Squada+One&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">

    <!-- links to bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script defer src="Navbar.js"></script>


    <title>Andrew's CV</title>
</head>

<body>
    <div class="w-100 h-100 position-fixed z-0" style="backdrop-filter: blur(5px);"></div>
    <nav-bar></nav-bar>
    <div style="min-height: 50px; top: 0;"></div>

    <main class="container z-1 text-center d-flex flex-column h-100">
        <h1 class="text-center px-4 pb-1 my-4 m-auto rounded-5" style="box-shadow: 2px 4px 8px 4px rgba(0, 0, 0, 0.5); 
            background-color: var(--green1);">
            <span class="material-symbols-outlined" style="scale: 1.5;">
                construction
            </span>
            Projects
        </h1>
        <div class="d-flex flex-wrap justify-content-center gap-3">

            <div class="d-flex justify-content-center">
                <div class="card border border-1 border-black" style="width: 18rem;">
                    <img src="./images/Airsoft Tools.png" class="card-img-top" alt="Airsoft Tools"
                        style="height: 150px; object-fit: cover;">
                    <div class="card-body">
                        <h5 class="card-title">Airsoft Tools</h5>
                        <p class="card-text">Random team and game mode generator, designed for my airsoft team</p>
                        <a href="https://github.com/AndrewKostiv/Airsoft-Tools" target="_blank"
                            class="d-inline-block project-btn">Github</a>
                        <a href="https://airsoft-tools.vercel.app" target="_blank"
                            class="d-inline-block project-btn">Active Page</a>
                    </div>
                </div>
            </div>
            <div class="d-flex justify-content-center">
                <div class="card border border-1 border-black" style="width: 18rem; ">
                    <img src="./images/Study App.png" class="card-img-top" alt="Study App"
                        style="height: 150px; object-fit: cover;">
                    <div class="card-body">
                        <h5 class="card-title">Study Tool</h5>
                        <p class="card-text">Study Q/A cards with various study modes</p>
                        <a href="https://github.com/AndrewKostiv/Photon-Project-v0.24.0" target="_blank"
                            class="d-inline-block project-btn">Github</a>
                    </div>
                </div>
            </div>
        </div>
        <div class="d-flex flex-grow-1"></div>
        <a class="col-12 text-decoration-none" href="#top"><span class="bg-white px-3 pb-1 rounded-5 ">Return to
                top</span></a>
    </main>
</body>

</html>
